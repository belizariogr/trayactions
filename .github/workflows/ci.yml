name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-4-dev libjson-c-dev libwayland-dev

      - name: Unit tests
        run: ./test.sh

      - name: Unit tests with AddressSanitizer
        run: |
          set -eu
          mkdir -p bin
          cc -std=c11 -Wall -Wextra -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Isrc tests/test_menu_order.c src/menu_order.c \
            -o bin/test_menu_order_asan \
            $(pkg-config --cflags --libs glib-2.0)
          ASAN_OPTIONS=detect_leaks=0 ./bin/test_menu_order_asan

          cc -std=c11 -Wall -Wextra -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Isrc tests/test_workspace_route.c src/workspace_route.c \
            -o bin/test_workspace_route_asan \
            $(pkg-config --cflags --libs glib-2.0)
          ASAN_OPTIONS=detect_leaks=0 ./bin/test_workspace_route_asan

      - name: Build
        run: ./compile.sh
