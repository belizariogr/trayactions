name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-4-dev libjson-c-dev libwayland-dev

      - name: Build
        run: ./compile.sh

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.arch }}"
          mkdir -p dist
          BINARY="trayactions-${VERSION}-linux-${ARCH}"
          cp bin/trayactions "dist/${BINARY}"
          chmod +x "dist/${BINARY}"
          (cd dist && sha256sum "${BINARY}" > "${BINARY}.sha256")
          file "dist/${BINARY}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trayactions-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -lah dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TrayActions ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
