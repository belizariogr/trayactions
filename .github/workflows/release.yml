name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-4-dev libjson-c-dev

      - name: Build
        run: ./compile.sh

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp bin/trayactions "dist/trayactions-${VERSION}-linux-x86_64"
          chmod +x "dist/trayactions-${VERSION}-linux-x86_64"
          (cd dist && sha256sum "trayactions-${VERSION}-linux-x86_64" > "trayactions-${VERSION}-linux-x86_64.sha256")

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TrayActions ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/trayactions-${{ github.ref_name }}-linux-x86_64
            dist/trayactions-${{ github.ref_name }}-linux-x86_64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
