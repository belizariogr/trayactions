name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          set -eu
          git fetch --tags --force

          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "${LATEST}" ]; then
            LATEST="v0.0.0"
          fi

          VERSION="${LATEST#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "Previous: ${LATEST}"
          echo "Next: ${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        run: |
          set -eu
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "refs/tags/${VERSION}"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-4-dev libjson-c-dev libwayland-dev

      - name: Build
        run: ./compile.sh

      - name: Package binary
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          mkdir -p dist
          BINARY="trayactions-${VERSION}-linux-${ARCH}"
          cp bin/trayactions "dist/${BINARY}"
          chmod +x "dist/${BINARY}"
          (cd dist && sha256sum "${BINARY}" > "${BINARY}.sha256")
          file "dist/${BINARY}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trayactions-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -lah dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: TrayActions ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
